<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستشار الذكي</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), url('/static/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 600px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .main-card:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #ffffff;
            font-weight: 700;
            font-size: 2.6rem;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        p {
            color: #cbd5e1;
            font-weight: 300;
            font-size: 1.25rem;
            line-height: 1.7;
            margin-bottom: 35px;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #c5a880, #9a7b56);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 35px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 8px 20px rgba(154, 123, 86, 0.3);
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background: linear-gradient(135deg, #d4baa3, #aa8c67);
            box-shadow: 0 12px 24px rgba(154, 123, 86, 0.5);
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <div class="main-card">
        <h1>مرحبا بكم في موقع المستشار الذكي</h1>
        <p>نظام ذكي متكامل مدعوم بالذكاء الاصطناعي لمساعدتك في استخراج وتحليل الاستشارات القانونية بدقة وسرعة متناهية.</p>
        <a href="/chat" class="cta-button">ابدأ استشارتك الآن</a>
    </div>
</body>
</html>
