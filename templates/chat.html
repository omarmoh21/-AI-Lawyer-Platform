<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستشار الذكي — المحادثة</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), url('/static/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── Header ── */
        .chat-header {
            width: 100%;
            max-width: 750px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px 16px;
        }

        .chat-header h2 {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .back-link {
            color: #c5a880;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #d4baa3;
        }

        /* ── Chat card ── */
        .chat-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
            width: 90%;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            height: 72vh;
            overflow: hidden;
        }

        /* ── Messages area ── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: rgba(197, 168, 128, 0.4); border-radius: 4px; }

        /* ── Bubbles ── */
        .bubble {
            max-width: 78%;
            padding: 13px 18px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.7;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .bubble.user {
            background: linear-gradient(135deg, #c5a880, #9a7b56);
            color: #fff;
            align-self: flex-start;         /* RTL: user on right visually = flex-start */
            border-bottom-right-radius: 4px;
        }

        .bubble.assistant {
            background: rgba(255, 255, 255, 0.11);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e2e8f0;
            align-self: flex-end;
            border-bottom-left-radius: 4px;
        }

        /* ── Typing indicator ── */
        .bubble.typing {
            background: rgba(255, 255, 255, 0.11);
            border: 1px solid rgba(255, 255, 255, 0.12);
            align-self: flex-end;
            padding: 16px 20px;
        }

        .dots {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dots span {
            width: 7px;
            height: 7px;
            background: #c5a880;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40%           { transform: translateY(-6px); }
        }

        /* ── Input bar ── */
        .input-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.15);
        }

        .input-bar textarea {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            padding: 11px 16px;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.6;
            transition: border-color 0.2s;
        }

        .input-bar textarea::placeholder { color: #94a3b8; }
        .input-bar textarea:focus { border-color: rgba(197, 168, 128, 0.5); }

        .send-btn {
            background: linear-gradient(135deg, #c5a880, #9a7b56);
            border: none;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            padding: 11px 20px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(154, 123, 86, 0.3);
        }

        .send-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #d4baa3, #aa8c67);
            box-shadow: 0 6px 16px rgba(154, 123, 86, 0.5);
            transform: scale(1.03);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <h2>⚖️ المستشار الذكي</h2>
        <a href="/" class="back-link">→ الرئيسية</a>
    </div>

    <div class="chat-card">
        <div class="messages" id="messages">
            <!-- Welcome message -->
            <div class="bubble assistant">
                مرحباً! أنا مستشارك القانوني الذكي. يمكنني مساعدتك في الاستفسار عن القوانين المصرية. كيف يمكنني مساعدتك اليوم؟
            </div>
        </div>

        <div class="input-bar">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">إرسال</button>
            <textarea
                id="queryInput"
                rows="1"
                placeholder="اكتب سؤالك القانوني هنا..."
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"
            ></textarea>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl    = document.getElementById('queryInput');
        const sendBtn    = document.getElementById('sendBtn');

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function handleKey(e) {
            // Send on Enter (without Shift)
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function appendBubble(text, role) {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'bubble typing';
            div.id = 'typing';
            div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }

        async function sendMessage() {
            const query = inputEl.value.trim();
            if (!query) return;

            // Show user bubble
            appendBubble(query, 'user');
            inputEl.value = '';
            inputEl.style.height = 'auto';
            sendBtn.disabled = true;

            // Show typing indicator
            showTyping();

            try {
                const res = await fetch('/legal-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query }),
                });

                const data = await res.json();
                removeTyping();
                appendBubble(data.answer, 'assistant');
            } catch (err) {
                removeTyping();
                appendBubble('حدث خطأ أثناء الاتصال بالخادم. يرجى المحاولة مرة أخرى.', 'assistant');
            } finally {
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }
    </script>

</body>
</html>
